# Site settings
title: "Robina Li"
description: "Technical Blog - Exploring algorithms, data structures, and software engineering insights"
baseurl: "/blog_leetcode_java" # the subpath of your site, e.g. /blog_leetcode
url: "https://robinali34.github.io" # the base hostname & protocol for your site

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
show_excerpts: true

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Pagination
paginate: 10
paginate_path: "/posts/page:num/"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Navigation
header_pages:
  - about.md
  - java-guide.html
  - leetcode-questions-list.md
  - leetcode-templates.html

# Social links
github_username: robinali34
linkedin_username: robinali

# Optional Chinese translation widget (Google Translate, lazy-loaded on demand)
translate:
  enabled: true
  page_language: en
  included_languages: "zh-CN,zh-TW"
  title: "中文翻译"
  subtitle: "可选 · Optional"
  hint: "机器翻译仅供参考，代码与技术术语可能不准确。"
  restore_label: "恢复英文"

