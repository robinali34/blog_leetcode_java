<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="javaTmplTitle javaTmplDesc" class="template-diagram-svg">
  <title id="javaTmplTitle">Java Features to LeetCode Templates</title>
  <desc id="javaTmplDesc">How language building blocks connect to common solution patterns.</desc>
  <defs>
    <style>
      .lang { fill: #D4D8E0; stroke: #8B8680; stroke-width: 1.5; }
      .pat { fill: #E8D5D0; stroke: #8B8680; stroke-width: 1.4; }
      .prob { fill: #fff; stroke: #B8B5B0; stroke-width: 1.3; }
      .title { font: 600 15px ui-sans-serif, system-ui, sans-serif; fill: #5A5752; }
      .label { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #5A5752; }
      .hint { font: 400 9.5px ui-sans-serif, system-ui, sans-serif; fill: #7A7772; }
      .flow { stroke: #9A9792; stroke-width: 1.3; fill: none; marker-end: url(#java-tmpl-arrow); }
    </style>
    <marker id="java-tmpl-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9A9792"/>
    </marker>
  </defs>

  <rect width="980" height="520" fill="#FAF7F2" rx="12"/>
  <text x="490" y="32" text-anchor="middle" class="title">From Java building blocks to LeetCode templates</text>
  <text x="490" y="52" text-anchor="middle" class="hint">Learn the feature once, reuse the same skeleton across dozens of problems.</text>

  <!-- column headers -->
  <text x="160" y="82" text-anchor="middle" class="label">Java tool</text>
  <text x="490" y="82" text-anchor="middle" class="label">Template pattern</text>
  <text x="820" y="82" text-anchor="middle" class="label">Example problems</text>

  <!-- row 1 -->
  <rect x="40" y="100" width="240" height="44" class="lang" rx="8"/>
  <text x="160" y="127" text-anchor="middle" class="label">HashMap + array scan</text>
  <path class="flow" d="M280 122 L360 122"/>
  <rect x="360" y="100" width="260" height="44" class="pat" rx="8"/>
  <text x="490" y="127" text-anchor="middle" class="label">Two pointers / complement</text>
  <path class="flow" d="M620 122 L700 122"/>
  <rect x="700" y="100" width="240" height="44" class="prob" rx="8"/>
  <text x="820" y="127" text-anchor="middle" class="label">Two Sum · 3Sum</text>

  <!-- row 2 -->
  <rect x="40" y="165" width="240" height="44" class="lang" rx="8"/>
  <text x="160" y="192" text-anchor="middle" class="label">Deque (stack)</text>
  <path class="flow" d="M280 187 L360 187"/>
  <rect x="360" y="165" width="260" height="44" class="pat" rx="8"/>
  <text x="490" y="192" text-anchor="middle" class="label">Monotonic stack</text>
  <path class="flow" d="M620 187 L700 187"/>
  <rect x="700" y="165" width="240" height="44" class="prob" rx="8"/>
  <text x="820" y="192" text-anchor="middle" class="label">Valid parens · daily temps</text>

  <!-- row 3 -->
  <rect x="40" y="230" width="240" height="44" class="lang" rx="8"/>
  <text x="160" y="257" text-anchor="middle" class="label">Queue + visited[][]</text>
  <path class="flow" d="M280 252 L360 252"/>
  <rect x="360" y="230" width="260" height="44" class="pat" rx="8"/>
  <text x="490" y="257" text-anchor="middle" class="label">BFS on grid/graph</text>
  <path class="flow" d="M620 252 L700 252"/>
  <rect x="700" y="230" width="240" height="44" class="prob" rx="8"/>
  <text x="820" y="257" text-anchor="middle" class="label">Rotting oranges · islands</text>

  <!-- row 4 -->
  <rect x="40" y="295" width="240" height="44" class="lang" rx="8"/>
  <text x="160" y="322" text-anchor="middle" class="label">Recursion + List path</text>
  <path class="flow" d="M280 317 L360 317"/>
  <rect x="360" y="295" width="260" height="44" class="pat" rx="8"/>
  <text x="490" y="322" text-anchor="middle" class="label">DFS / backtracking</text>
  <path class="flow" d="M620 317 L700 317"/>
  <rect x="700" y="295" width="240" height="44" class="prob" rx="8"/>
  <text x="820" y="322" text-anchor="middle" class="label">Subsets · permutations</text>

  <!-- row 5 -->
  <rect x="40" y="360" width="240" height="44" class="lang" rx="8"/>
  <text x="160" y="387" text-anchor="middle" class="label">Arrays.sort + two pointers</text>
  <path class="flow" d="M280 382 L360 382"/>
  <rect x="360" y="360" width="260" height="44" class="pat" rx="8"/>
  <text x="490" y="387" text-anchor="middle" class="label">Binary search / sliding window</text>
  <path class="flow" d="M620 382 L700 382"/>
  <rect x="700" y="360" width="240" height="44" class="prob" rx="8"/>
  <text x="820" y="387" text-anchor="middle" class="label">Search rotated · min window</text>

  <!-- row 6 -->
  <rect x="40" y="425" width="240" height="44" class="lang" rx="8"/>
  <text x="160" y="452" text-anchor="middle" class="label">PriorityQueue</text>
  <path class="flow" d="M280 447 L360 447"/>
  <rect x="360" y="425" width="260" height="44" class="pat" rx="8"/>
  <text x="490" y="452" text-anchor="middle" class="label">Heap / Dijkstra / k-way merge</text>
  <path class="flow" d="M620 447 L700 447"/>
  <rect x="700" y="425" width="240" height="44" class="prob" rx="8"/>
  <text x="820" y="452" text-anchor="middle" class="label">Merge k lists · top K</text>

  <text x="490" y="500" text-anchor="middle" class="hint">See also: LeetCode Templates index for full pattern collections per category.</text>
</svg>
